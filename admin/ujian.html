      </div>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2><i class="fas fa-user-shield"></i> Admin</h2>
    <ul class="menu">
      <li><a href="dashboard.html" class="active"><i class="fa fa-home"></i> Dashboard</a></li>
      <li><a href="siswa.html"><i class="fa fa-users"></i> Data Siswa</a></li>
      <li><a href="guru.html"><i class="fa fa-chalkboard-teacher"></i> Data Guru</a></li>

<!-- CONTENT -->
<main class="content">

<h1><i class="fa fa-clock"></i> Jadwal Ujian</h1>
<p>Buat jadwal ujian dari Bank Soal</p>

<!-- FORM -->
<div class="card">
  <h3>Buat Jadwal</h3>

  <label>Pilih Bank Soal</label>
  <select id="soalSelect"></select>
  <input id="durasi" type="number" placeholder="Durasi (menit)">

  <button class="btn" id="btnBuat">
  ➕ Buat Jadwal
</button>


</div>

<!-- LIST -->
<div class="card">
  <h3>Daftar Jadwal</h3>

  <table class="table">
    <thead>
      <tr>
        <th>Ujian</th>
        <th>Mapel</th>
        <th>Kelas</th>
        <th>Kode</th>
        <th>Durasi</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

</main>
</div>
