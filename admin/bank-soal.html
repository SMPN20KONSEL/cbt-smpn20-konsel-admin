<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bank Soal</title>

<!-- CSS -->
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/admin.css">
<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px;
  margin-top:20px;
}
.bank-card{
  background:#fff;
  padding:18px;
  border-radius:14px;
  box-shadow:0 6px 15px rgba(0,0,0,.08);
  transition:.3s;
  cursor:pointer;
}
.bank-card:hover{transform:translateY(-4px);}
.bank-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.badge{
  background:#2563eb;
  color:#fff;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
}
.actions button{
  background:none;
  border:none;
  cursor:pointer;
  font-size:16px;
  margin-left:8px;
}
.edit{color:#2563eb;}
.hapus{color:#dc2626;}
.subtitle{color:#666;margin-bottom:15px;}
.soal-info{
  margin-top:8px;
  color:#444;
  font-size:14px;
}
.soal-info i{
  color:#2563eb;
  margin-right:6px;
}
.total{
  margin-top:6px;
  font-weight:bold;
}
.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,.5);
  justify-content:center;
  align-items:center;
}

.modal-content {
  animation: scaleIn 0.2s ease;
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:350px;
}

.save{
  background:#2563eb;
  color:#fff;
}

.batal{
  background:#dc2626;
  color:#fff;
}
.folder-header{
  cursor:pointer;
  padding:10px;
  border-radius:8px;
  margin-top:20px;
  color:#fff;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.folder-content{
  display:none;
}

.folder-open .folder-content{
  display:grid;
}

/* warna beda */
.sas{ background:#2563eb; }
.sts{ background:#16a34a; }
.sh{ background:#f59e0b; }
.lain{ background:#6b7280; }

@keyframes scaleIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.toast {
  pointer-events: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  background: #16a34a;
  color: #fff;
  padding: 14px 20px;
  border-radius: 10px;
  font-size: 14px;
  z-index: 9999;
  
  box-shadow: 0 10px 25px rgba(0,0,0,.25);
  animation: fadeIn 0.3s ease;
  text-align: center;
  min-width: 260px;
}
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translate(-50%, -60%) scale(0.9);
  }
  to {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
}
</style>
</head>

<body>
<header class="topbar">
    <div class="brand">
      <img src="../assets/img/logo-sekolah.png" class="brand-logo" alt="Logo Sekolah">
      <div class="brand-text">
        <strong>SMPN 20 KONAWE SELATAN</strong>
        <small>CBT Application</small>
      </div>
    </div>
  </header>
<div class="dashboard">

<!-- SIDEBAR -->
<aside class="sidebar">
  <h2><i class="fas fa-user-shield"></i> Admin</h2>
  <ul class="menu">
    <li><a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a></li>
    <li><a href="siswa.html"><i class="fa fa-users"></i> Data Siswa</a></li>
    <li><a href="guru.html"><i class="fa fa-chalkboard-teacher"></i> Data Guru</a></li>
    <li><a href="bank-soal.html" class="active"><i class="fa fa-book"></i> Bank Soal</a></li>
    <li><a href="buat-soal.html"><i class="fa fa-pen"></i> Buat Soal</a></li>
    <li><a href="kartu-ujian.html"><i class="fa fa-id-card"></i> Kartu Ujian</a></li>
    <li><a href="ujian.html"><i class="fa fa-chart-bar"></i> Ruang Ujian</a></li>
    <li><a href="nilai.html"><i class="fa fa-chart-bar"></i> Nilai</a></li>
  </ul>
  <button class="logout" id="logout">
    <i class="fas fa-sign-out-alt"></i> Logout
  </button>
</aside>

<!-- CONTENT -->
<main class="content">
  <h1><i class="fa fa-book"></i> Bank Soal</h1>
  <p class="subtitle">Daftar seluruh bank soal</p>
  <input 
  type="text" 
  id="searchInput" 
  placeholder="🔍 Cari bank soal..." 
  style="padding:10px;width:100%;max-width:400px;border-radius:8px;border:1px solid #ccc;margin-bottom:15px;">
  <div id="list"></div>
</main>
<!-- MODAL EDIT -->
<div id="modalEdit" class="modal">
  <div class="modal-content">
    <h3>Edit Bank Soal</h3>

    <label>Judul</label>
    <input id="editJudul">

    <label>Mapel</label>
    <input id="editMapel">

    <label>Kelas</label>
    <input id="editKelas">

    <br><br>

    <button onclick="simpanEdit()" class="save">💾 Simpan</button>
    <button onclick="tutupModal()" class="batal">Batal</button>
  </div>
</div>
<div id="modalHapus" class="modal">
  <div class="modal-content">
    <h3>Konfirmasi Hapus</h3>
    <p>Yakin ingin menghapus bank soal ini?</p>

    <br>
    <button id="btnHapusOk" class="save">🗑️ Hapus</button>
    <button id="btnHapusBatal" class="batal">Batal</button>
  </div>
</div>
</div>

<!-- JS -->
<script type="module">
import { db, auth } from "../assets/js/firebase.js";
import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
import {
  collection,
  getDocs,
  deleteDoc,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";
const list = document.getElementById("list");

// AUTH
onAuthStateChanged(auth, user => {
  if (!user) location.href = "../login.html";
  loadBankSoal();
});

// LOAD BANK SOAL
async function loadBankSoal() {
  list.innerHTML = "<p>Memuat data...</p>";

  const snap = await getDocs(collection(db, "bank_soal"));

  if (snap.empty) {
    list.innerHTML = "<p>Belum ada bank soal</p>";
    return;
  }

  list.innerHTML = "";

  const kelompok = {
    "Sumatif Akhir Semester": [],
    "Sumatif Tengah Semester": [],
    "Sumatif Harian": [],
    "Lainnya": []
  };

  snap.forEach(docSnap => {
    const s = docSnap.data() || {};
    const data = { id: docSnap.id, ...s };

    const judul = (s.judul || "").toLowerCase();

    if (judul.includes("sumatif akhir semester")) {
      kelompok["Sumatif Akhir Semester"].push(data);
    }
    else if (judul.includes("sumatif tengah semester")) {
      kelompok["Sumatif Tengah Semester"].push(data);
    }
    else if (judul.includes("sumatif harian")) {
      kelompok["Sumatif Harian"].push(data);
    }
    else {
      kelompok["Lainnya"].push(data);
    }
  });

  const labelMap = {
    soalPG: "Pilihan Ganda",
    soalMCMA: "PG Kompleks",
    soalKategori: "Kategori",
    soalEssay: "Esai"
  };

  Object.keys(kelompok).forEach(nama => {

  const dataList = kelompok[nama];
  if (dataList.length === 0) return;

  let classWarna = "lain";
  if (nama === "Sumatif Akhir Semester") classWarna = "sas";
  else if (nama === "Sumatif Tengah Semester") classWarna = "sts";
  else if (nama === "Sumatif Harian") classWarna = "sh";

  const idGroup = nama.replace(/\s+/g, '_');

  list.innerHTML += `
    <div class="folder ${classWarna}">
      
      <div class="folder-header ${classWarna}" onclick="toggleFolder('${idGroup}')">
        <span>📂 ${nama} (${dataList.length})</span>
        <span>▼</span>
      </div>

      <div class="folder-content cards-grid" id="group-${idGroup}">
      </div>

    </div>
  `;

  const container = document.getElementById(`group-${idGroup}`);

  dataList.forEach(s => {

    let total = 0;
    let infoHTML = "";

    Object.keys(labelMap).forEach(key => {
      const arr = s[key];

      if (Array.isArray(arr) && arr.length > 0) {
        total += arr.length;

        infoHTML += `
          <div>
            <i class="fa fa-list"></i>
            ${labelMap[key]}: <b>${arr.length}</b>
          </div>
        `;
      }
    });

    container.innerHTML += `
      <div class="bank-card" data-judul="${(s.judul || '').toLowerCase()}">
        <div onclick="lihatSoal('${s.id}')">

          <div class="bank-header">
            <span class="badge">${s.mapel} • Kelas ${s.kelas}</span>

            <div class="actions" onclick="event.stopPropagation()">
              <button class="edit" onclick="editBankSoal('${s.id}')">
                <i class="fa fa-edit"></i>
              </button>

              <button class="hapus" onclick="hapusBankSoal('${s.id}')">
                <i class="fa fa-trash"></i>
              </button>
            </div>
          </div>

          <h3>${s.judul}</h3>

          <p style="font-size:12px;color:#666;">
            Dibuat oleh: ${s.namaGuru || "-"}
          </p>

          <div class="soal-info">
            ${infoHTML || "<i>Tidak ada soal</i>"}
          </div>

          <div class="total">
            Total Soal: ${total}
          </div>

        </div>
      </div>
    `;
  });

});
window.toggleFolder = (id) => {
  const el = document.getElementById("group-" + id);
  el.parentElement.classList.toggle("folder-open");
};
}
document.getElementById("searchInput").addEventListener("input", function(){
  const keyword = this.value.toLowerCase();

  document.querySelectorAll(".bank-card").forEach(card=>{
    const judul = card.dataset.judul + " " + card.innerText.toLowerCase();

    if(judul.includes(keyword)){
      card.style.display = "block";
    }else{
      card.style.display = "none";
    }
  });
});

// NAVIGASI
window.lihatSoal = id => {
  location.href = `lihat-soal.html?id=${id}`;
};

// HAPUS
let idYangAkanDihapus = null;

// Klik tombol hapus
window.hapusBankSoal = (id) => {
  idYangAkanDihapus = id;
  document.getElementById("modalHapus").style.display = "flex";
};

// Tombol batal
document.getElementById("btnHapusBatal").onclick = () => {
  document.getElementById("modalHapus").style.display = "none";
  idYangAkanDihapus = null;
};

// Tombol OK hapus
document.getElementById("btnHapusOk").onclick = async () => {
  if (!idYangAkanDihapus) return;

  tampilkanToast("⏳ Menghapus...");

  await deleteDoc(doc(db, "bank_soal", idYangAkanDihapus));

  tampilkanToast("🗑️ Berhasil dihapus");

  document.getElementById("modalHapus").style.display = "none";

  idYangAkanDihapus = null;
  loadBankSoal();
};
let currentId = "";

// BUKA MODAL
window.editBankSoal = async (id) => {
  currentId = id;

  const ref = doc(db, "bank_soal", id);
  const snap = await getDoc(ref);
  const data = snap.data();

  document.getElementById("editJudul").value = data.judul || "";
  document.getElementById("editMapel").value = data.mapel || "";
  document.getElementById("editKelas").value = data.kelas || "";

  document.getElementById("modalEdit").style.display = "flex";
};

// TUTUP MODAL
window.tutupModal = () => {
  document.getElementById("modalEdit").style.display = "none";
};

// SIMPAN
window.simpanEdit = async () => {
  await updateDoc(doc(db, "bank_soal", currentId), {
    judul: document.getElementById("editJudul").value,
    mapel: document.getElementById("editMapel").value,
    kelas: document.getElementById("editKelas").value
  });

  tampilkanToast("✅ Berhasil diupdate");

  tutupModal();
  loadBankSoal();
};
function tampilkanToast(pesan) {
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.textContent = pesan;

  document.body.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 3000);
}
</script>

<script type="module" src="../assets/js/logout.js"></script>

</body>
</html>
