<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bank Soal</title>

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/admin.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* =============================== JUDUL ================================ */
.content {
  max-width: 1200px;
  margin-right: auto;
}

#list {
  width: 100%;
}

.content h1 {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  text-align: center;
}

/* =============================== SUBTITLE ============================= */
.subtitle {
  text-align: center;
  color: #666;
  margin-bottom: 15px;
}

#searchInput {
  display: block;
  margin: 0 auto 20px auto;
  padding: 10px;
  width: 100%;
  max-width: 400px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* =============================== GRID ================================ */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

/* =============================== CARD ================================ */
.bank-card {
  background: #fff;
  padding: 18px;
  border-radius: 14px;
  box-shadow: 0 6px 15px rgba(0,0,0,.08);
  transition: 0.25s;
  cursor: pointer;
  height: 100%;
}

.bank-card:hover {
  transform: translateY(-5px);
}

.bank-card h3 {
  margin: 0;
  font-size: 16px;
}

/* header card sejajar */
.bank-title-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}

.mapel-badge {
  background: #2563eb;
  color: #fff;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  white-space: nowrap;
}

/* =============================== INFO ================================ */
.soal-info {
  margin-top: 10px;
  font-size: 14px;
  color: #444;
}

.soal-info div {
  margin-bottom: 4px;
}

.soal-info i {
  color: #2563eb;
  margin-right: 5px;
}

.total {
  margin-top: 8px;
  font-weight: bold;
}

.bottom-row {
  display: flex;
  align-items: center;
  margin-top: 10px;
  font-size: 14px;
}

/* total di kiri */
.bottom-row .total {
  font-weight: bold;
}

/* tanggal dorong ke kanan */
.bottom-row .tanggal {
  margin-left: auto;
  color: #555;
}
.bottom-row i {
  color: #b217fa;
}
/* =============================== FOLDER =============================== */
.folder {
  margin-bottom: 20px;
  border-radius: 12px;
  overflow: hidden;
}

.folder-header {
  padding: 12px 16px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #fff;
}

/* warna folder */
.folder.sas .folder-header { background: #2563eb; }
.folder.sts .folder-header { background: #16a34a; }
.folder.sh  .folder-header { background: #f59e0b; }
.folder.usbn .folder-header { background: #dc2626; }
.folder.lain .folder-header { background: #6b7280; }

/* folder collapse system */
.folder.collapsed .folder-content {
  display: none;
}

.folder-content {
  padding: 15px;
}

/* =============================== SEARCH ============================== */
.search-box {
  text-align: center;
  margin-bottom: 10px;
}

/* =============================== ANIMATION =========================== */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

</style>
</head>

<body>

<header class="topbar">
<div class="brand">
<img src="../assets/img/logo-sekolah.png" class="brand-logo">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<div class="brand-text">
<strong>SMPN 20 KONAWE SELATAN</strong>
<small>CBT Application</small>
</div>
</div>
</header>

<div class="dashboard">

<aside class="sidebar">
<h2><i class="fas fa-user-shield"></i> Admin</h2>

<ul class="menu">
<li><a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a></li>
<li><a href="siswa.html"><i class="fa fa-users"></i> Data Siswa</a></li>
<li><a href="guru.html"><i class="fa fa-chalkboard-teacher"></i> Data Guru</a></li>
<li><a href="bank-soal.html" class="active"><i class="fa fa-book"></i> Bank Soal</a></li>
<li><a href="kartu-ujian.html"><i class="fa fa-id-card"></i> Kartu Ujian</a></li>
<li><a href="ujian.html"><i class="fa fa-desktop"></i> Ruang Ujian</a></li>
<li><a href="monitor-siswa.html"><i class="fa fa-eye"></i> Monitor Ujian</a></li>

</ul>

<button class="logout" id="logout">
<i class="fas fa-sign-out-alt"></i> Logout
</button>
</aside>

<main class="content">

<div class="page-top">
<h1><i class="fa fa-book"></i> Bank Soal</h1>
<p class="subtitle">Daftar seluruh bank soal</p>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="🔍 Cari judul, mapel, kelas...">
</div>

<div id="list"></div>

</main>
</div>

<script type="module">
import { db, auth } from "../assets/js/firebase.js";
import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

const list = document.getElementById("list");

onAuthStateChanged(auth, user => {
if (!user) {
location.href = "../login.html";
return;
}
loadBankSoal();
});
function formatTanggal(ts){
  if (!ts) return "-";

  const date = ts.toDate(); // 🔥 convert Firestore timestamp
  return date.toLocaleDateString("id-ID", {
    day: "2-digit",
    month: "long",
    year: "numeric"
  });
}


async function loadBankSoal() {

list.innerHTML = "<p>Memuat data...</p>";

const snap = await getDocs(collection(db, "bank_soal"));

if (snap.empty) {
list.innerHTML = "<p>Belum ada bank soal</p>";
return;
}

list.innerHTML = "";

const kelompok = {
"Sumatif Akhir Semester": [],
"Sumatif Tengah Semester": [],
"Sumatif Harian": [],
"USBN": [],
"Lainnya": []
};

snap.forEach(d => {
const s = d.data();
const data = { ...s, id: d.id };

const judul = (s.judul || "").toLowerCase();

if (
  judul.includes("sumatif akhir semester") || 
  judul.startsWith("sas") ||
  judul.includes("sas ")
) {
  kelompok["Sumatif Akhir Semester"].push(data);
}
else if (judul.includes("sumatif tengah semester") ||  judul.startsWith("sts") ||judul.includes("sts")) {
kelompok["Sumatif Tengah Semester"].push(data);
}
else if (judul.includes("sumatif harian") || judul.startsWith("sh") || judul.includes("sh")) {
kelompok["Sumatif Harian"].push(data);
}
else if (judul.includes("usbn") || judul.startsWith("usbn")) {
kelompok["USBN"].push(data);
}
else {
kelompok["Lainnya"].push(data);
}
});

const labelMap = {
soalPG: "Pilihan Ganda",
soalMCMA: "PG Kompleks",
soalKategori: "Kategori",
soalEssay: "Esai"
};

Object.keys(kelompok).forEach(nama => {

const dataList = kelompok[nama];
if (!dataList.length) return;

let warna = "lain";
if (nama === "Sumatif Akhir Semester") warna = "sas";
else if (nama === "Sumatif Tengah Semester") warna = "sts";
else if (nama === "Sumatif Harian") warna = "sh";
else if (nama === "USBN") warna = "usbn";
const id = nama.replace(/\s+/g, "_");

list.innerHTML += `
<div class="folder ${warna} collapsed">
<div class="folder-header" onclick="toggleFolder('${id}')">
<span>📂 ${nama} (${dataList.length})</span>
<span>▼</span>
</div>

<div id="group-${id}" class="folder-content cards-grid"></div>
</div>
`;

const container = document.getElementById(`group-${id}`);

dataList.forEach(s => {

let total = 0;
let infoHTML = "";

Object.keys(labelMap).forEach(key => {
const arr = s[key];
if (Array.isArray(arr) && arr.length) {
total += arr.length;
infoHTML += `
<div>
<i class="fa fa-list"></i>
${labelMap[key]}: <b>${arr.length}</b>
</div>`;
}
});

const card = document.createElement("div");
card.className = "bank-card";
card.onclick = () => {
  console.log("Klik ID:", s.id);
  lihatSoal(s.id);
};

card.innerHTML = `
<div class="bank-title-row">
<h3>${s.judul || "-"}</h3>
<span class="mapel-badge">${s.mapel || "-"}</span>
</div>

<p>Kelas : ${s.kelas || "-"}</p>
<p>Dibuat oleh : ${s.namaGuru || "-"}</p>

<div class="soal-info">${infoHTML}</div>

<div class="bottom-row">
  <span class="total">
    Total Soal : ${total}
  </span>

  <span class="tanggal">
    <i class="fa-solid fa-calendar"></i> ${formatTanggal(s.dibuat)}
  </span>
</div>
`;

container.appendChild(card);

});
});
}

/* TOGGLE FOLDER */
window.toggleFolder = (id) => {
document.getElementById("group-" + id)
.parentElement
.classList.toggle("collapsed");
};

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", function () {

const keyword = this.value.toLowerCase();

document.querySelectorAll(".folder").forEach(folder => {

let visible = 0;

folder.querySelectorAll(".bank-card").forEach(card => {
const txt = card.innerText.toLowerCase();

if (txt.includes(keyword)) {
card.style.display = "block";
visible++;
} else {
card.style.display = "none";
}
});

folder.style.display = visible ? "block" : "none";

});
});

window.lihatSoal = (id) => {
  if (!id) {
    alert("❌ ID tidak ditemukan");
    return;
  }
  location.href = `lihat-soal.html?id=${id}`;
};

</script>

<script type="module" src="../assets/js/logout.js"></script>

</body>
</html>
