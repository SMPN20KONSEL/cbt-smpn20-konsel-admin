<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Monitor Siswa</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    /* =====================================================
   CONTENT (JANGAN RUSAK ADMIN)
===================================================== */
.content {
  display: flex;
  flex-direction: column;
  align-items: center; /* 🔥 center semua isi */
  padding: 30px;
}

/* =====================================================
   WRAPPER TABLE (BIAR TENGAH & LEBAR)
===================================================== */
.table-wrap {
  width: 100%;
  max-width: 1100px; /* 🔥 atur lebar */
  overflow-x: auto;  /* 🔥 scroll kalau kepanjangan */
}

/* =====================================================
   TABLE
===================================================== */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;

  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* header */
th {
  background: #0b48ac;
  color: white;
}

/* cell */
th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: center;
  font-size: 14px;
}

/* hover */
tr:hover {
  background: #f1f5f9;
}
/* ===============================
   NAMA SISWA / KOLOM TEKS RATA KIRI
================================ */
.tabel-kelas td:nth-child(2),
.tabel-kelas th:nth-child(2),
table td:nth-child(2),
table th:nth-child(2) {
  text-align: left !important;
}

/* biar lebih enak dibaca */
.tabel-kelas td:nth-child(2),
table td:nth-child(2) {
  font-weight: 500;
}
/* =====================================================
   STATUS WARNA
===================================================== */
.online { color: orange; }
.kerja { color: blue; font-weight: bold; }
.selesai { color: green; font-weight: bold; }
.offline { color: red; }

/* =====================================================
   BUTTON
===================================================== */
button {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  cursor: pointer;
  font-size: 13px;
}

button:hover {
  background: #1e40af;
}

/* =====================================================
   RESPONSIVE
===================================================== */
@media (max-width: 768px) {
  .content {
    padding: 20px;
  }
}
  </style>
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="topbar">
  <div class="brand">
    <img src="../assets/img/logo-sekolah.png" class="brand-logo">
    <div class="brand-text">
      <strong>SMPN 20 KONAWE SELATAN</strong>
      <small>CBT Application</small>
    </div>
  </div>
</header>

<div class="dashboard">

  <!-- ================= SIDEBAR ================= -->
<aside class="sidebar">
  <h2><i class="fas fa-user-shield"></i> Admin</h2>
  <ul class="menu">
      <li><a href="dashboard.html" class="active"><i class="fa fa-home"></i> Dashboard</a></li>
      <li><a href="siswa.html"><i class="fa fa-users"></i> Data Siswa</a></li>
      <li><a href="guru.html"><i class="fa fa-chalkboard-teacher"></i> Data Guru</a></li>
      <li><a href="bank-soal.html"><i class="fa fa-book"></i> Bank Soal</a></li>
      <li><a href="kartu-ujian.html"><i class="fa fa-id-card"></i> Kartu Ujian</a></li>
      <li><a href="ujian.html"><i class="fa fa-desktop"></i> Ruang Ujian</a></li>
      <li><a href="monitor-siswa.html"><i class="fa fa-eye"></i> Monitor Ujian  </a></li>
      <li><a href="nilai.html"> <i class="fa fa-graduation-cap"></i> Nilai</a></li>
  </ul>
  <button class="logout" id="logout">
    <i class="fas fa-sign-out-alt"></i> Logout
  </button>
</aside>

  <!-- ================= CONTENT ================= -->
  <div class="content">

    <h1>📊 Monitoring Siswa Ujian</h1>

    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Nama</th>
          <th>Email</th>
          <th>Kelas</th>
          <th>Kode Ujian</th>
          <th>Status</th>
          <th>Login</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>

  </div>

</div>

<!-- ================= SCRIPT ================= -->
<script type="module">
import { db } from "../assets/js/firebase.js";
import {
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

const tableBody = document.getElementById("table-body");

// 🔥 cek offline (tidak aktif > 1 menit)
function isOffline(lastActive) {
  if (!lastActive) return true;
  return (Date.now() - lastActive.toDate().getTime()) > 60000;
}

onSnapshot(collection(db, "peserta"), (snapshot) => {

  tableBody.innerHTML = "";
  let no = 1;

  const docs = [];
  snapshot.forEach(doc => {
    docs.push({ id: doc.id, ...doc.data() });
  });

  docs.sort((a, b) => {
    const order = {
      mengerjakan: 1,
      mulai: 1,
      online: 2,
      selesai: 3
    };
    return (order[a.status] || 4) - (order[b.status] || 4);
  });

  docs.forEach(data => {

const lastOnline = data.lastOnline;

let isOnline = false;

if (lastOnline && lastOnline.toDate) {
  const selisih = Date.now() - lastOnline.toDate().getTime();
  isOnline = selisih <= 60000;
}

let statusBadge = "🔴 Offline";
let statusClass = "offline";

if (isOnline) {
  if (data.status === "login") {
    statusBadge = "🟡 Login";
    statusClass = "online";
  }

  if (data.status === "belum_mulai") {
    statusBadge = "🟣 Belum Mulai";
    statusClass = "online";
  }

  if (data.status === "mengerjakan") {
    statusBadge = "🔵 Sedang Ujian";
    statusClass = "kerja";
  }

  if (data.status === "selesai") {
    statusBadge = "🟢 Selesai";
    statusClass = "selesai";
  }
}

const uid = data.id;
tableBody.innerHTML += `
  <tr>
    <td>${no++}</td>
    <td>${data.nama || "-"}</td>
    <td>${data.email || "-"}</td>
    <td>${data.kelas || "-"}</td>
    <td>${data.kodeUjian || "-"}</td>
    <td class="${statusClass}">${statusBadge}</td>
    <td>${data.loginAt ? data.loginAt.toDate().toLocaleTimeString() : "-"}</td>
    <td>
      <button onclick="location.href='detail-siswa.html?id=${encodeURIComponent(uid)}'">
        Lihat
      </button>
    </td>
  </tr>

    `;
  });

});
</script>

</body>
</html>
