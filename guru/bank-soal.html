 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
 /* ===============================
   JUDUL
================================ */
.content {
  max-width: 1200px;
  margin-right: auto;
}

/* biar isi tidak terlalu nempel */
#list {
  width: 100%;
}

.content h1 {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  text-align: center;
}

/* ===============================
   SUBTITLE & SEARCH
================================ */
.subtitle {
  text-align: center;
  color: #666;
  margin-bottom: 15px;
}

#searchInput {
  display: block;
  margin: 0 auto 20px auto;
  padding: 10px;
  width: 100%;
  max-width: 400px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* ===============================
   GRID
================================ */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

/* ===============================
   CARD
================================ */
.bank-card {
  background: #fff;
  padding: 18px;
  border-radius: 14px;
  box-shadow: 0 6px 15px rgba(0,0,0,.08);
  transition: 0.25s;
  cursor: pointer;
  height: 100%;
}

.bank-card:hover {
  transform: translateY(-5px);
}

.bank-card h3 {
  margin: 10px 0;
  font-size: 16px;
}

/* ===============================
   HEADER CARD
================================ */
.bank-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.badge {
  background: #2563eb;
  color: #fff;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
}

/* ===============================
   ACTION BUTTON
================================ */
.actions {
  display: flex;
  gap: 6px;
}

.actions button {
  background: #f1f5f9;
  border: none;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
}

.actions button:hover {
  background: #e2e8f0;
}

.edit { color: #2563eb; }
.hapus { color: #dc2626; }

/* ===============================
   INFO SOAL
================================ */
.soal-info {
  margin-top: 10px;
  font-size: 14px;
  color: #444;
}

.soal-info div {
  margin-bottom: 4px;
}

.soal-info i {
  color: #2563eb;
  margin-right: 5px;
}

.total {
  margin-top: 8px;
  font-weight: bold;
}

/* ===============================
   FOLDER
================================ */
.folder {
  margin-bottom: 20px;
  border-radius: 12px;
  overflow: hidden;
}

.folder-header {
  padding: 12px 16px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #fff;
}

/* warna folder (FIX target) */
.folder.sas .folder-header { background: #2563eb; }
.folder.sts .folder-header { background: #16a34a; }
.folder.sh  .folder-header { background: #f59e0b; }
.folder.lain .folder-header { background: #6b7280; }

.folder-content {
  display: none;
  padding: 15px;
}

.folder-open .folder-content {
  display: grid;
}

/* ===============================
   MODAL
================================ */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  width: 350px;
  max-width: 90%;
  animation: scaleIn 0.2s ease;
}

.modal-content input {
  width: 100%;
  padding: 10px;
  margin: 6px 0 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.save {
  background: #2563eb;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
}

.batal {
  background: #dc2626;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
}

/* ===============================
   TOAST
================================ */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #16a34a;
  color: #fff;
  padding: 14px 20px;
  border-radius: 10px;
  font-size: 14px;
  z-index: 9999;
  box-shadow: 0 10px 25px rgba(0,0,0,.25);
  animation: fadeIn 0.3s ease;
  text-align: center;
  min-width: 250px;
}

/* ===============================
   ANIMATION
================================ */
@keyframes scaleIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translate(-50%, -60%) scale(0.9);
  }
  to {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
}
</style>
</head>

<body>

    <div class="brand">
      <img src="../assets/img/logo-sekolah.png" class="brand-logo" alt="Logo Sekolah">
      <div class="brand-text">
        <strong>SMPN 20 KONAWE SELATAN</strong>
        <small>CBT Application</small>
      </div>
    </div>
  </header>
<div class="dashboard">

 <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2><i class="fa fa-chalkboard-teacher"></i> Guru</h2>

    <ul class="menu">
      <li>
        <a href="dashboard-guru.html" class="active">
          <i class="fa fa-home"></i> Dashboard
        </a>
      </li>
      <li>
        <a href="buat-soal.html">
          <i class="fa fa-pen"></i> Buat Soal
        </a>
      </li>
      <li>
        <a href="bank-soal.html">
          <i class="fa fa-book"></i> Bank Soal
        </a>
      </li>
       <li>
        <a href="koreksi-essay.html">
          <i class="fa fa-book"></i> Koreksi Essay
        </a>
      </li>
      <li>
        <a href="rekap-nilai.html">

<!-- CONTENT -->
<main class="content">
  <h1><i class="fa fa-book"></i> Bank Soal</h1>
  <p class="subtitle">Daftar seluruh bank soal</p>
  <div id="list" class="cards-grid"></div>
</main>
<div id="modalEdit" style="
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:999;
">
  <div style="
    background:#fff;
    padding:20px;
    border-radius:10px;
    width:300px;
  ">
    <h3>Edit Bank Soal</h3>

    <input id="editJudul" placeholder="Judul" style="width:100%;margin:5px 0;">
    <input id="editMapel" placeholder="Mapel" style="width:100%;margin:5px 0;">
    <input id="editKelas" placeholder="Kelas" style="width:100%;margin:5px 0;">

    <div style="margin-top:10px;text-align:right;">
      <button onclick="tutupModal()">Batal</button>
      <button onclick="simpanEdit()">Simpan</button>
    </div>
  </div>
</div>
</div>

<!-- JS -->
<script type="module">
import { db, auth } from "../assets/js/firebase.js";
import {
  collection,
  getDocs,
  deleteDoc,
  doc,
  where,
  query,
  getDoc,       // ✅ tambahkan
  updateDoc     // ✅ tambahkan
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";
import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

const list = document.getElementById("list");
let currentUser = null;
// AUTH
onAuthStateChanged(auth, user => {
  if (!user) {
    location.href = "../login.html";
    return;
  }

  currentUser = user; // ✅ simpan
  loadBankSoal(user);
});

// LOAD BANK SOAL
async function loadBankSoal(user) {
  list.innerHTML = "<p>Memuat data...</p>";

  const q = query(
  collection(db, "bank_soal"),
  where("guruId", "==", user.uid) // 🔥 FILTER GURU LOGIN
);

const snap = await getDocs(q);

  if (snap.empty) {
    list.innerHTML = "<p>Belum ada bank soal</p>";
    return;
  }

  list.innerHTML = "";

  const labelMap = {
    soalPG: "Pilihan Ganda",
    soalMCMA: "PG Kompleks",
    soalKategori: "Kategori",
    soalEssay: "Esai"
  };

  snap.forEach(docSnap => {
    const s = docSnap.data();

    let total = 0;
    let infoHTML = "";

    Object.keys(labelMap).forEach(key => {
      const arr = s[key];

      if (Array.isArray(arr) && arr.length > 0) {
        total += arr.length;

        infoHTML += `
          <div>
            <i class="fa fa-list"></i>
            ${labelMap[key]}: <b>${arr.length}</b>
          </div>
        `;
      }
    });

    list.innerHTML += `
      <div class="bank-card" onclick="lihatSoal('${docSnap.id}')">
        <div class="bank-header">
          <span class="badge">${s.mapel} • Kelas ${s.kelas}</span>

          <div class="actions" onclick="event.stopPropagation()">
            <button class="edit" onclick="editBankSoal('${docSnap.id}')">
              <i class="fa fa-edit"></i>
            </button>

            <button class="hapus" onclick="hapusBankSoal('${docSnap.id}')">
              <i class="fa fa-trash"></i>
            </button>
          </div>
        </div>

        <h3>${s.judul}</h3>
<p style="font-size:12px;color:#666;">
  Dibuat oleh: ${s.namaGuru || "-"}
</p>
        <div class="soal-info">
          ${infoHTML || "<i>Tidak ada soal</i>"}
        </div>

        <div class="total">
          Total Soal: ${total}
        </div>
      </div>
    `;
  });
}
window.toggleFolder = (id) => {
  const el = document.getElementById("group-" + id);
  el.parentElement.classList.toggle("folder-open");
};

// NAVIGASI
window.lihatSoal = id => {
  location.href = `lihat-soal.html?id=${id}`;
};

// HAPUS
window.hapusBankSoal = async id => {
  if (!confirm("Hapus bank soal ini?")) return;

  list.innerHTML = "<p>Menghapus...</p>"; // optional loading

  await deleteDoc(doc(db, "bank_soal", id));
  loadBankSoal(currentUser); // ✅ BENAR
};
let currentId = "";

// BUKA MODAL
window.editBankSoal = async (id) => {
  currentId = id;

  const ref = doc(db, "bank_soal", id);
  const snap = await getDoc(ref);
  const data = snap.data();

  document.getElementById("editJudul").value = data.judul || "";
  document.getElementById("editMapel").value = data.mapel || "";
  document.getElementById("editKelas").value = data.kelas || "";

  document.getElementById("modalEdit").style.display = "flex";
};

// TUTUP MODAL
window.tutupModal = () => {
  document.getElementById("modalEdit").style.display = "none";
};

// SIMPAN
window.simpanEdit = async () => {
  await updateDoc(doc(db, "bank_soal", currentId), {
    judul: document.getElementById("editJudul").value,
    mapel: document.getElementById("editMapel").value,
    kelas: document.getElementById("editKelas").value
  });

  alert("Berhasil diupdate");

  tutupModal();
  loadBankSoal(currentUser);
};

</script>

<script type="module" src="../assets/js/logout.js"></script>

</body>
