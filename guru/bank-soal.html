<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bank Soal</title>

<!-- CSS -->
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/admin.css">
<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px;
  margin-top:20px;
}
.bank-card{
  background:#fff;
  padding:18px;
  border-radius:14px;
  box-shadow:0 6px 15px rgba(0,0,0,.08);
  transition:.3s;
  cursor:pointer;
}
.bank-card:hover{transform:translateY(-4px);}
.bank-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.badge{
  background:#2563eb;
  color:#fff;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
}
.actions button{
  background:none;
  border:none;
  cursor:pointer;
  font-size:16px;
  margin-left:8px;
}
.edit{color:#2563eb;}
.hapus{color:#dc2626;}
.subtitle{color:#666;margin-bottom:15px;}
.soal-info{
  margin-top:8px;
  color:#444;
  font-size:14px;
}
.soal-info i{
  color:#2563eb;
  margin-right:6px;
}
.total{
  margin-top:6px;
  font-weight:bold;
}
#modalEdit{
  animation: fadeIn .2s ease;
}
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>
<header class="topbar">
    <div class="brand">
      <img src="../assets/img/logo-sekolah.png" class="brand-logo" alt="Logo Sekolah">
      <div class="brand-text">
        <strong>SMPN 20 KONAWE SELATAN</strong>
        <small>CBT Application</small>
      </div>
    </div>
  </header>
<div class="dashboard">

 <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2><i class="fa fa-chalkboard-teacher"></i> Guru</h2>

    <ul class="menu">
      <li>
        <a href="dashboard-guru.html" class="active">
          <i class="fa fa-home"></i> Dashboard
        </a>
      </li>
      <li>
        <a href="buat-soal.html">
          <i class="fa fa-pen"></i> Buat Soal
        </a>
      </li>
      <li>
        <a href="bank-soal.html">
          <i class="fa fa-book"></i> Bank Soal
        </a>
      </li>
       <li>
        <a href="koreksi-essay.html">
          <i class="fa fa-book"></i> Koreksi Essay
        </a>
      </li>
      <li>
        <a href="rekap-nilai.html">
          <i class="fa fa-chart-column"></i> Rekap Nilai
        </a>
      </li>
    </ul>

    <button class="logout" id="logout">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </aside>

<!-- CONTENT -->
<main class="content">
  <h1><i class="fa fa-book"></i> Bank Soal</h1>
  <p class="subtitle">Daftar seluruh bank soal</p>
  <div id="list" class="cards-grid"></div>
</main>
<div id="modalEdit" style="
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:999;
">
  <div style="
    background:#fff;
    padding:20px;
    border-radius:10px;
    width:300px;
  ">
    <h3>Edit Bank Soal</h3>

    <input id="editJudul" placeholder="Judul" style="width:100%;margin:5px 0;">
    <input id="editMapel" placeholder="Mapel" style="width:100%;margin:5px 0;">
    <input id="editKelas" placeholder="Kelas" style="width:100%;margin:5px 0;">

    <div style="margin-top:10px;text-align:right;">
      <button onclick="tutupModal()">Batal</button>
      <button onclick="simpanEdit()">Simpan</button>
    </div>
  </div>
</div>
</div>

<!-- JS -->
<script type="module">
import { db, auth } from "../assets/js/firebase.js";
import {
  collection,
  getDocs,
  deleteDoc,
  doc,
  where,
  query,
  getDoc,       // ✅ tambahkan
  updateDoc     // ✅ tambahkan
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";
import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

const list = document.getElementById("list");
let currentUser = null;
// AUTH
onAuthStateChanged(auth, user => {
  if (!user) {
    location.href = "../login.html";
    return;
  }

  currentUser = user; // ✅ simpan
  loadBankSoal(user);
});

// LOAD BANK SOAL
async function loadBankSoal(user) {
  list.innerHTML = "<p>Memuat data...</p>";

  const q = query(
  collection(db, "bank_soal"),
  where("guruId", "==", user.uid) // 🔥 FILTER GURU LOGIN
);

const snap = await getDocs(q);

  if (snap.empty) {
    list.innerHTML = "<p>Belum ada bank soal</p>";
    return;
  }

  list.innerHTML = "";

  const labelMap = {
    soalPG: "Pilihan Ganda",
    soalMCMA: "PG Kompleks",
    soalKategori: "Kategori",
    soalEssay: "Esai"
  };

  snap.forEach(docSnap => {
    const s = docSnap.data();

    let total = 0;
    let infoHTML = "";

    Object.keys(labelMap).forEach(key => {
      const arr = s[key];

      if (Array.isArray(arr) && arr.length > 0) {
        total += arr.length;

        infoHTML += `
          <div>
            <i class="fa fa-list"></i>
            ${labelMap[key]}: <b>${arr.length}</b>
          </div>
        `;
      }
    });

    list.innerHTML += `
      <div class="bank-card" onclick="lihatSoal('${docSnap.id}')">
        <div class="bank-header">
          <span class="badge">${s.mapel} • Kelas ${s.kelas}</span>

          <div class="actions" onclick="event.stopPropagation()">
            <button class="edit" onclick="editBankSoal('${docSnap.id}')">
              <i class="fa fa-edit"></i>
            </button>

            <button class="hapus" onclick="hapusBankSoal('${docSnap.id}')">
              <i class="fa fa-trash"></i>
            </button>
          </div>
        </div>

        <h3>${s.judul}</h3>
<p style="font-size:12px;color:#666;">
  Dibuat oleh: ${s.namaGuru || "-"}
</p>
        <div class="soal-info">
          ${infoHTML || "<i>Tidak ada soal</i>"}
        </div>

        <div class="total">
          Total Soal: ${total}
        </div>
      </div>
    `;
  });
}
window.toggleFolder = (id) => {
  const el = document.getElementById("group-" + id);
  el.parentElement.classList.toggle("folder-open");
};

// NAVIGASI
window.lihatSoal = id => {
  location.href = `lihat-soal.html?id=${id}`;
};

// HAPUS
window.hapusBankSoal = async id => {
  if (!confirm("Hapus bank soal ini?")) return;

  list.innerHTML = "<p>Menghapus...</p>"; // optional loading

  await deleteDoc(doc(db, "bank_soal", id));
  loadBankSoal(currentUser); // ✅ BENAR
};
let currentId = "";

// BUKA MODAL
window.editBankSoal = async (id) => {
  currentId = id;

  const ref = doc(db, "bank_soal", id);
  const snap = await getDoc(ref);
  const data = snap.data();

  document.getElementById("editJudul").value = data.judul || "";
  document.getElementById("editMapel").value = data.mapel || "";
  document.getElementById("editKelas").value = data.kelas || "";

  document.getElementById("modalEdit").style.display = "flex";
};

// TUTUP MODAL
window.tutupModal = () => {
  document.getElementById("modalEdit").style.display = "none";
};

// SIMPAN
window.simpanEdit = async () => {
  await updateDoc(doc(db, "bank_soal", currentId), {
    judul: document.getElementById("editJudul").value,
    mapel: document.getElementById("editMapel").value,
    kelas: document.getElementById("editKelas").value
  });

  alert("Berhasil diupdate");

  tutupModal();
  loadBankSoal(currentUser);
};

</script>

<script type="module" src="../assets/js/logout.js"></script>

</body>
</html>
