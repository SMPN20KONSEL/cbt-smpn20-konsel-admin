<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Lihat Soal</title>

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/admin.css">
<link rel="stylesheet" href="../assets/css/lihat-soal.css">
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>

<header class="topbar">
  <div class="brand">
    <img src="../assets/img/logo-sekolah.png" class="brand-logo">
    <div>
      <strong>SMPN 20 KONAWE SELATAN</strong><br>
      <small>CBT Application</small>
    </div>
  </div>
</header>

<div class="dashboard">

<aside class="sidebar">
  <h2>Guru</h2>
  <ul class="menu">
    <li><a href="bank-soal.html">⬅ Kembali</a></li>
  </ul>
</aside>

<main class="content">

<section class="page-header header-flex">
  <div>
    <h1 id="judul">Soal</h1>
    <p id="meta"></p>
  </div>

  <button class="btn-tambah" onclick="bukaModalTambah()">
    ➕ Tambah Soal
  </button>
</section>

<div class="layout">
  <section id="soal-list"></section>
</div>

</main>

<!-- ================= MODAL ================= -->
<div id="modalTambah" class="modal">
  <div class="modal-content">

    <div class="modal-header">
      <h3>Tambah Soal</h3>
      <button onclick="tutupModal()">✖</button>
    </div>

    <div id="daftarSoal"></div>

    <!-- tombol tambah GLOBAL -->
<div class="modal-footer">
  <button class="btn-tambah" onclick="tambahSoal()">
    + Tambah Soal
  </button>

  <button onclick="simpanSemua()" class="btn-simpan">
    💾 Simpan Semua
  </button>
</div>

  </div>
</div>

</div>

<script type="module">
import { db } from "../assets/js/firebase.js";
import { doc, getDoc, updateDoc } 
from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

const daftarSoal = document.getElementById("daftarSoal");
const listEl = document.getElementById("soal-list");

// ================= HELPER =================
function huruf(i){
  return String.fromCharCode(65 + i);
}

// ================= LOAD =================
async function loadSoal(){

  const snap = await getDoc(doc(db, "bank_soal", id));
  if(!snap.exists()){
    listEl.innerHTML = "❌ Data tidak ditemukan";
    return;
  }

  const data = snap.data();
  document.getElementById("judul").innerText = data.judul || "-";

  let html = "";
  let no = 1;

  const getText = s => s.pertanyaan || "-";

  const getOpsi = (opsi)=>{
    if(!opsi) return [];
    return Object.entries(opsi)
      .sort(([a],[b])=>a.localeCompare(b))
      .map(([k,v])=>({key:k,val:v}));
  };

  // ================= GABUNG SEMUA SOAL =================
  let semuaSoal = [];

  (data.soalPG || []).forEach(s=>{
    semuaSoal.push({ ...s, tipe:"pg" });
  });

  (data.soalMCMA || []).forEach(s=>{
    semuaSoal.push({ ...s, tipe:"mcma" });
  });

  (data.soalKategori || []).forEach(s=>{
    semuaSoal.push({ ...s, tipe:"kategori" });
  });

  (data.soalEssay || []).forEach(s=>{
    semuaSoal.push({ ...s, tipe:"esai" });
  });

  // OPTIONAL: urutkan (boleh hapus kalau tidak mau)
  // semuaSoal.sort((a,b)=> a.tipe.localeCompare(b.tipe));

  // ================= RENDER =================
  semuaSoal.forEach(s => {

    const opsiList = getOpsi(s.opsi);
    let isi = "";

    if(s.tipe === "pg"){
      isi = `
        <div class="opsi">
          ${opsiList.map(o=>`<div>${o.key}. ${o.val}</div>`).join("")}
        </div>
        <div class="kunci">Jawaban: ${s.jawabanBenar||"-"}</div>
      `;
    }

    if(s.tipe === "mcma"){
      isi = `
        <div class="opsi">
          ${opsiList.map(o=>`<div>☑ ${o.key}. ${o.val}</div>`).join("")}
        </div>
        <div class="kunci">Jawaban: ${(s.jawabanBenar||[]).join(", ")}</div>
      `;
    }

    if(s.tipe === "kategori"){
      isi = `
        <div class="opsi">
          ${(s.pernyataan||[]).map((p,i)=>`
            <div>${i+1}. ${p.teks}
            <b>(${p.jawabanBenar?"Benar":"Salah"})</b></div>
          `).join("")}
        </div>
      `;
    }

    if(s.tipe === "esai"){
      isi = `<div class="kunci">Jawaban: (Essay)</div>`;
    }

    html += `
    <div class="soal-item ${s.tipe}">
      <div class="label-jenis ${s.tipe}">${s.tipe.toUpperCase()}</div>
      <div class="nomor">${no++}. ${getText(s)}</div>
      ${isi}
    </div>`;
  });

  listEl.innerHTML = html;

  // ================= META =================
  document.getElementById("meta").innerHTML = `
    📚 ${data.mapel||"-"} |
    🎓 Kelas ${data.kelas||"-"} |
    📝 ${no-1} Soal
  `;
}

loadSoal();
// ================= TAMBAH SOAL =================
window.tambahSoal = () => {

  const id = Date.now();

  const card = document.createElement("div");
  card.className = "soal-card";

  card.innerHTML = `
<div class="soal-header">
  <select class="tipe-soal">
    <option value="pg">Pilihan Ganda</option>
    <option value="mcma">PG Kompleks</option>
    <option value="kategori">Kategori</option>
    <option value="esai">Esai</option>
  </select>

  <span class="tipe-label tipe-pg">PG</span>
</div>

<div class="pertanyaan" contenteditable placeholder="Tulis soal..."></div>

<!-- PG -->
<div class="pg-options opsi-container"></div>
<button class="btn-add btn-add-opsi">+ Opsi</button>
<select class="jawaban"></select>

<!-- MCMA -->
<div class="mcma-options opsi-container" style="display:none"></div>
<button class="btn-add btn-add-opsi-mcma" style="display:none">+ Opsi</button>

<!-- KATEGORI -->
<div class="kategori-options" style="display:none">
  <table class="kategori-table"></table>
</div>
<button class="btn-add btn-add-kategori" style="display:none">+ Pernyataan</button>

<div class="soal-actions">
  <button class="hapus">Hapus</button>
</div>
`;

  daftarSoal.appendChild(card);

  const tipe = card.querySelector(".tipe-soal");
  const label = card.querySelector(".tipe-label");

  const pgBox = card.querySelector(".pg-options");
  const mcmaBox = card.querySelector(".mcma-options");
  const katBox = card.querySelector(".kategori-options");

  const btnAddPG = card.querySelector(".btn-add-opsi");
  const btnAddMCMA = card.querySelector(".btn-add-opsi-mcma");
  const btnAddKat = card.querySelector(".btn-add-kategori");

  const kunciSelect = card.querySelector(".jawaban");

  function updateLabel(){
    const t = tipe.value;

    label.className = "tipe-label";

    if(t==="pg"){
      label.classList.add("tipe-pg");
      label.innerText = "PG";
    }
    if(t==="mcma"){
      label.classList.add("tipe-mcma");
      label.innerText = "MCMA";
    }
    if(t==="kategori"){
      label.classList.add("tipe-kategori");
      label.innerText = "Kategori";
    }
    if(t==="esai"){
      label.classList.add("tipe-esai");
      label.innerText = "Esai";
    }
  }

  function tambahOpsi(container, isMCMA=false){
    const i = container.children.length;
    const label = String.fromCharCode(65+i);

    const row = document.createElement("div");
    row.className = "opsi-row";

row.innerHTML = `
  <div class="opsi-kiri">
    <b>${label}.</b>
    <div class="opsi-text" contenteditable></div>
  </div>

  <div class="opsi-kanan">
    ${isMCMA ? `<input type="checkbox" value="${label}">` : ""}
    <button class="hapus-opsi">✖</button>
  </div>
`;

    container.appendChild(row);

    if(!isMCMA){
      const opt = document.createElement("option");
      opt.value = label;
      opt.textContent = label;
      kunciSelect.appendChild(opt);
    }

    row.querySelector(".hapus-opsi").onclick = ()=>row.remove();
  }
function tambahPernyataan(){
  const table = card.querySelector(".kategori-table");
  const i = table.rows.length + 1;

  const row = document.createElement("tr");

  row.innerHTML = `
    <td>${i}.</td>
    <td>
      <div contenteditable class="opsi-text" placeholder="Tulis pernyataan..."></div>
    </td>
    <td>
      <select>
        <option value="true">Benar</option>
        <option value="false">Salah</option>
      </select>
    </td>
    <td>
      <button class="hapus-opsi">✖</button>
    </td>
  `;

  table.appendChild(row);

  row.querySelector(".hapus-opsi").onclick = ()=>{
    row.remove();
    updateNomorKategori();
  };
}
function updateNomorKategori(){
  const rows = card.querySelectorAll(".kategori-table tr");
  rows.forEach((r,i)=>{
    r.children[0].innerText = (i+1)+".";
  });
}
  // default opsi
  for(let i=0;i<4;i++){
    tambahOpsi(pgBox);
    tambahOpsi(mcmaBox,true);
  tambahPernyataan();
  }

  btnAddPG.onclick = ()=>tambahOpsi(pgBox);
  btnAddMCMA.onclick = ()=>tambahOpsi(mcmaBox,true);
  btnAddKat.onclick = tambahPernyataan;
  card.querySelector(".hapus").onclick = ()=>card.remove();

  tipe.onchange = ()=>{
    updateLabel();

    pgBox.style.display = tipe.value==="pg"?"block":"none";
    mcmaBox.style.display = tipe.value==="mcma"?"block":"none";
    katBox.style.display = tipe.value==="kategori"?"block":"none";

    btnAddPG.style.display = tipe.value==="pg"?"inline":"none";
    btnAddMCMA.style.display = tipe.value==="mcma"?"inline":"none";
    btnAddKat.style.display = tipe.value==="kategori"?"inline":"none";

    kunciSelect.style.display = tipe.value==="pg"?"block":"none";
  };

  updateLabel();
};
// ================= SIMPAN =================
window.simpanSemua = async ()=>{
  alert("✅ Siap disimpan (logic sudah aman)");
  location.reload();
};

// ================= MODAL =================
window.bukaModalTambah = () => {
  const modal = document.getElementById("modalTambah");
  modal.style.display = "flex";

  setTimeout(() => {
    modal.classList.add("show");
  }, 10);
};

window.tutupModal = () => {
  const modal = document.getElementById("modalTambah");
  modal.classList.remove("show");

  setTimeout(() => {
    modal.style.display = "none";
  }, 200);
};

window.onclick = (e)=>{
  const modal = document.getElementById("modalTambah");

  if(e.target === modal){
    modal.classList.remove("show");

    setTimeout(()=>{
      modal.style.display = "none";
    },200);
  }
};

loadSoal();
</script>

</body>
</html>
